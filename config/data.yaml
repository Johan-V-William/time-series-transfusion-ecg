# ============================================================
# ECG / MIT-BIH Data Configuration for DDPM Training
# ============================================================

dataset:
  train_ratio: 0.8        # chỉ dùng khi split random (không dùng cho ECG)
  random_seed: 2021

# ============================================================
# ECG Preprocessing
#
# Pipeline (per record):
#   bandpass_filter → zscore_per_lead → windowing strategy
#
# Chọn windowing strategy bằng windowing.method:
#   "hard_fixed" → FixedECG   (stride cố định, không cần R-peak)
#   "rpeak"      → AdaptiveECG (căn window theo R-peak, fixed size)
#   "adaptive"   → AdaptiveECG (RR-interval + nonlinear warp)
# ============================================================
ecg:
  data_dir: "/content/data"
  shuffle: true

  train_records:
    - "101" - "106" - "108" - "109" - "112" - "114"
    - "115" - "116" - "118" - "119" - "122" - "124"
    - "201" - "203" - "205" - "207" - "208" - "209"
    - "215" - "220" - "223" - "230"

  test_records:
    - "100" - "103" - "105" - "111" - "113" - "117"
    - "121" - "123" - "200" - "202" - "210" - "212"
    - "213" - "214" - "217" - "219" - "221" - "222"
    - "228" - "231" - "232" - "233" - "234"

  bandpass_filter:
    lowcut:  0.5
    highcut: 40.0
    fs:      360
    order:   4

  # ── Chọn một trong 3 strategy ────────────────────────────
  windowing:

    # Strategy 1 — FixedECG
    method:  "hard_fixed"
    seq_len: 512
    stride:  512

    # Strategy 2 — AdaptiveECG (rpeak)
    # method:        "rpeak"
    # pre_peak_ms:   192
    # post_peak_ms:  512

    # Strategy 3 — AdaptiveECG (adaptive + nonlinear warp)
    # method:      "adaptive"
    # target_len:  null       # điền sau khi hiện thực nonlinear_warp()
