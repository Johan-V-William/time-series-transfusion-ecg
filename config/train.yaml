training:
  epochs: 5000
  batch_size: 256
  lr: 1e-4
  betas: [0.9, 0.99]
  log_every: 100
  vis_every: 500
  save_dir: "saved_files"

# ============================================================
# Model — TransEncoder
# ============================================================
model:
  hidden_dim: 256
  num_layers: 6
  n_heads: 8

# ============================================================
# Diffusion — GaussianDiffusion1D
# ============================================================
diffusion:
  timesteps: 1000
  beta_schedule: "cosine"    # cosine | linear | quadratic | sigmoid
  objective: "pred_v"        # pred_v | pred_x0 | pred_noise
  loss_type: "l2"

# ============================================================
# Evaluation
# ============================================================
evaluation:
  sample_size: 250
  autocorr_lag: 50
  tsne_perplexity: 40
  sampling_rate: 500

  sigw1:
    enabled: false
    depth: 4
    normalise: true
    augmentations: ["add_time"]

  downstream:
    enabled: false
    classifier: "knn"        # knn | svm | rf
    n_splits: 5

# ============================================================
# Optional postprocess after generation
# ============================================================
postprocess_generated:
  enabled: false
  dataset_type: "mit"
  output_name: "generated_labeled.pt"
  annotation_file: null
  use_model_for_label: false
  checkpoint: null
